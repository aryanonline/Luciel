AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Luciel CloudWatch alarm pack. Step 28: 3 worker metric filters +
  7 alarms (worker liveness/health/errors, RDS connections/CPU/storage,
  SSM failures). Arc 9 C7 extension: 4 backend metric filters + 4
  alarms (audit-immutability tamper [High], GUC-leak guard [High],
  ops-role connect velocity [Medium], audit-write velocity [Medium]),
  plus PD SNS-HTTPS subscription resolved from SSM. Region
  ca-central-1, account 729005488042. Full design notes in
  docs/runbooks/arc9-c7-observability.md and the docs/runbooks/
  step-28-phase-2-deploy.md.

Parameters:
  AlertEmail:
    Type: String
    Default: aryans.www@gmail.com
    Description: >
      Email address for alarm notifications. After stack create the
      address will receive an SNS confirmation email - the subscription
      stays in PendingConfirmation until that link is clicked.
  WorkerLogGroupName:
    Type: String
    Default: /ecs/luciel-worker
    Description: CloudWatch Logs group for the worker service.
  WorkerClusterName:
    Type: String
    Default: luciel-cluster
    Description: ECS cluster hosting luciel-worker-service.
  WorkerServiceName:
    Type: String
    Default: luciel-worker-service
    Description: ECS service running the celery worker.
  RdsInstanceIdentifier:
    Type: String
    Default: luciel-db
    Description: RDS DBInstanceIdentifier (verified via describe-db-instances 2026-05-05).
  RdsConnectionThreshold:
    Type: Number
    Default: 90
    Description: 80% of max_connections (~112) on db.t3.micro.
  RdsCpuThresholdPercent:
    Type: Number
    Default: 85
    Description: CPU utilization percent that triggers the alarm.
  RdsFreeStorageThresholdBytes:
    Type: Number
    Default: 4294967296
    Description: 4 GiB free space floor on the 20 GiB RDS volume.
  WorkerErrorThreshold:
    Type: Number
    Default: 5
    Description: ERROR log lines per 5 min that trigger the alarm.

  # ------------------------------------------------------------------
  # Arc 9 C7 parameters
  # ------------------------------------------------------------------
  BackendLogGroupName:
    Type: String
    Default: /ecs/luciel-backend
    Description: >
      CloudWatch Logs group for the FastAPI backend service. The
      Arc 9 C7 metric filters parse audit-immutability denials,
      ops-role connect events, GUC-leak guard violations, and
      per-admin audit-log write events from this group.
  PagerDutyServiceKeySsmParam:
    Type: String
    Default: /luciel/prod/pagerduty/integration_url
    Description: >
      SSM parameter NAME that holds the PagerDuty Events-API v2
      integration URL (HTTPS endpoint). The PagerDuty SNS-HTTPS
      subscription resolves the parameter at stack-deploy time via
      ``{{resolve:ssm:NAME:VERSION}}`` -- which means the URL never
      lives in this repo, never lives in the CloudFormation
      parameter overrides log, and is opaque to anyone who only has
      describe-stacks access. Rotating the URL is a put-parameter
      (creates a new SSM version) + update-stack bumping
      PagerDutyServiceKeySsmVersion. See
      docs/runbooks/arc9-c7-observability.md for the deploy order.

  PagerDutyServiceKeySsmVersion:
    Type: String
    Default: "1"
    AllowedPattern: "^[1-9][0-9]*$"
    Description: >
      Version number of the SSM parameter named in
      PagerDutyServiceKeySsmParam to resolve. CFN requires a version
      pin when the parameter NAME itself is built via Sub ${...}.
      Bump this on every PD-URL rotation: ``aws ssm put-parameter``
      creates a new version; then ``aws cloudformation update-stack``
      with the bumped version makes CFN pick it up. The CFN stack
      history then records an audit trail of when each PD URL was
      activated.
  OpsRoleConnectVelocityThreshold:
    Type: Number
    Default: 10
    Description: >
      luciel_ops BYPASSRLS connections per 15-minute window that
      trigger the Medium-severity velocity alarm. Normal cleanup
      activity is <=2/day, so 10/15min is a generous anomaly floor.
  AdminAuditWriteVelocityThreshold:
    Type: Number
    Default: 50
    Description: >
      admin_audit_logs writes per 5-minute window across the whole
      backend before the Medium-severity velocity alarm fires.
      Catches mass-mutation runaways (cascade bugs, accidental bulk
      ops, compromised-admin runs).

Resources:

  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: luciel-prod-alerts
      DisplayName: Luciel Prod Alerts

  AlertEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlertTopic
      Protocol: email
      Endpoint: !Ref AlertEmail

  # ------------------------------------------------------------------
  # Log MetricFilters on /ecs/luciel-worker
  # ------------------------------------------------------------------

  HeartbeatMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref WorkerLogGroupName
      FilterName: luciel-worker-heartbeat-touched
      FilterPattern: '"healthcheck heartbeat: touched"'
      MetricTransformations:
        - MetricNamespace: Luciel/Worker
          MetricName: HeartbeatTouchCount
          MetricValue: "1"
          DefaultValue: 0
          Unit: Count

  WorkerErrorMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref WorkerLogGroupName
      FilterName: luciel-worker-error-lines
      FilterPattern: '?ERROR ?Error ?error'
      MetricTransformations:
        - MetricNamespace: Luciel/Worker
          MetricName: ErrorLogLineCount
          MetricValue: "1"
          DefaultValue: 0
          Unit: Count

  SsmAccessDeniedMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref WorkerLogGroupName
      FilterName: luciel-worker-ssm-access-denied
      FilterPattern: '?AccessDeniedException ?"is not authorized to perform: ssm:" ?ParameterNotFound'
      MetricTransformations:
        - MetricNamespace: Luciel/Worker
          MetricName: SsmAccessFailureCount
          MetricValue: "1"
          DefaultValue: 0
          Unit: Count

  # ------------------------------------------------------------------
  # Alarms
  # ------------------------------------------------------------------

  WorkerNoHeartbeatAlarm:
    Type: AWS::CloudWatch::Alarm
    DependsOn: HeartbeatMetricFilter
    Properties:
      AlarmName: luciel-worker-no-heartbeat
      AlarmDescription: >
        Worker producer-heartbeat (Commit 7 rev 11) emits
        "healthcheck heartbeat: touched" every 15s, so a healthy
        worker produces ~4 events per 60s window. Alarm fires when
        4 of 5 consecutive 60s windows have fewer than 1 heartbeat
        (i.e. ~4-5min outage tolerated for one transient ingestion
        glitch). CloudWatch alarm Period must be 10/20/30 or a
        multiple of 60; 60 is the smallest legal value that gives
        sub-1min granularity. Strongest worker-liveness signal in
        the system.
      Namespace: Luciel/Worker
      MetricName: HeartbeatTouchCount
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 5
      DatapointsToAlarm: 4
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic

  WorkerUnhealthyTaskCountAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: luciel-worker-unhealthy-task-count
      AlarmDescription: >
        ECS worker service running task count drops below 1 for two
        consecutive 1-minute periods. Catches the case where the
        service is down even before the heartbeat alarm sees missed
        windows.
      Namespace: AWS/ECS
      MetricName: RunningTaskCount
      Dimensions:
        - Name: ClusterName
          Value: !Ref WorkerClusterName
        - Name: ServiceName
          Value: !Ref WorkerServiceName
      Statistic: Average
      Period: 60
      EvaluationPeriods: 2
      DatapointsToAlarm: 2
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic

  WorkerErrorLogRateAlarm:
    Type: AWS::CloudWatch::Alarm
    DependsOn: WorkerErrorMetricFilter
    Properties:
      AlarmName: luciel-worker-error-log-rate
      AlarmDescription: >
        More than 5 ERROR log lines in two consecutive 5-minute windows.
        Surfaces sustained worker failure modes (DB pool exhaustion,
        broker churn, retention purge errors, etc.) without paging on
        a single transient blip.
      Namespace: Luciel/Worker
      MetricName: ErrorLogLineCount
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      DatapointsToAlarm: 2
      Threshold: !Ref WorkerErrorThreshold
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic

  RdsConnectionCountAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: luciel-rds-connection-count
      AlarmDescription: >
        RDS DatabaseConnections sustained above 80% of max_connections
        (~90 of ~112) for 5 minutes. Pre-revenue load profile should
        keep this near zero - any sustained breach is a leak signal.
      Namespace: AWS/RDS
      MetricName: DatabaseConnections
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref RdsInstanceIdentifier
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: !Ref RdsConnectionThreshold
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic

  RdsCpuAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: luciel-rds-cpu
      AlarmDescription: >
        RDS CPU above 85% for 10 minutes. db.t3.micro is burstable
        (20% baseline) so sustained breach signals either credit
        exhaustion or actual workload pressure - either deserves paging
        before queries start timing out.
      Namespace: AWS/RDS
      MetricName: CPUUtilization
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref RdsInstanceIdentifier
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      DatapointsToAlarm: 2
      Threshold: !Ref RdsCpuThresholdPercent
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic

  RdsFreeStorageAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: luciel-rds-free-storage
      AlarmDescription: >
        RDS FreeStorageSpace falls below 4 GiB on the 20 GiB volume
        (i.e. 80% used). Page well before RDS auto-scales storage so
        we have time to investigate audit-log growth or unexpected
        retention regressions.
      Namespace: AWS/RDS
      MetricName: FreeStorageSpace
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref RdsInstanceIdentifier
      Statistic: Average
      Period: 900
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: !Ref RdsFreeStorageThresholdBytes
      ComparisonOperator: LessThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic

  SsmAccessFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    DependsOn: SsmAccessDeniedMetricFilter
    Properties:
      AlarmName: luciel-ssm-getparameter-failures
      AlarmDescription: >
        Any SSM GetParameter access failure (AccessDeniedException,
        ParameterNotFound, or "is not authorized to perform: ssm:")
        on /ecs/luciel-worker over a 5-minute window. Catches IAM
        drift and parameter-deletion regressions before they cascade
        into worker-down.
      Namespace: Luciel/Worker
      MetricName: SsmAccessFailureCount
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic

  # ==================================================================
  # Arc 9 C7 -- Backend observability for tenant isolation
  # ==================================================================
  #
  # Doctrine references:
  #   D7.1 -- Every grant the ops role exercises emits a CloudWatch event
  #   D7.2 -- Every denial by an immutability policy emits a
  #           High-severity alarm
  #
  # The two High-severity alarms (AuditLogIntegrityBreach,
  # GUCLeakGuardViolation) publish to BOTH AlertTopic (SNS email)
  # and PagerDutyTopic (SNS HTTPS to PD Events API v2). Medium
  # alarms publish only to AlertTopic.
  #
  # All four metric filters parse /ecs/luciel-backend; the worker
  # log group is untouched.

  PagerDutyTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: luciel-prod-pagerduty-high
      DisplayName: Luciel Prod High-Severity (PagerDuty)

  PagerDutySubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref PagerDutyTopic
      Protocol: https
      # Resolved at stack deploy from the SSM parameter named in
      # PagerDutyServiceKeySsmParam, pinned at the version named in
      # PagerDutyServiceKeySsmVersion. The value at that parameter
      # is the PagerDuty Events API v2 integration URL, e.g.
      #   https://events.pagerduty.com/integration/<key>/enqueue
      #
      # CFN requires a VERSION pin when the SSM resolver name is
      # itself built via Sub ${...}. This is actually a useful
      # operational property: rotating the PD URL is a two-step
      # ritual -- (1) ``aws ssm put-parameter`` (creates v+1), then
      # (2) ``aws cloudformation update-stack`` with
      # PagerDutyServiceKeySsmVersion=v+1. The CFN history then
      # carries an audit trail of every PD URL rotation tied to a
      # stack-update timestamp.
      #
      # If the parameter is empty at deploy time the stack fails;
      # see docs/runbooks/arc9-c7-observability.md for the bootstrap
      # sequence.
      # NOTE: plain ``ssm`` resolver, not ``ssm-secure``. CFN does
      # not support ssm-secure on AWS::SNS::Subscription/Endpoint
      # (only RDS MasterUserPassword and a small allowlist of other
      # secret-shaped properties accept it). The PD integration URL
      # is therefore stored as a String SSM parameter, not a
      # SecureString. Access control falls to IAM on the SSM
      # parameter path -- the URL never reaches the repo or the
      # describe-stacks output and is only readable by principals
      # with ssm:GetParameter on /luciel/prod/pagerduty/*.
      #
      # Worst-case compromise impact is limited: the URL is a
      # write-only event ingest, not a credential. An attacker with
      # it can spam PD incidents but cannot read or exfiltrate
      # anything from PD, AWS, or Luciel.
      Endpoint: !Sub "{{resolve:ssm:${PagerDutyServiceKeySsmParam}:${PagerDutyServiceKeySsmVersion}}}"
      DeliveryPolicy:
        healthyRetryPolicy:
          numRetries: 3
          minDelayTarget: 5
          maxDelayTarget: 30
          numMinDelayRetries: 1
          numMaxDelayRetries: 1
          backoffFunction: exponential

  # ------------------------------------------------------------------
  # C7 MetricFilters on /ecs/luciel-backend
  # ------------------------------------------------------------------

  AdminAuditLogWriteMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref BackendLogGroupName
      FilterName: luciel-backend-admin-audit-log-write
      # The repositories.audit_chain before_flush listener emits a
      # debug line containing "admin_audit_logs chain row=" for
      # each row hashed and persisted. We match on the substring
      # "admin_audit_logs chain row=" so the count tracks the
      # number of audit rows landed (not the number of API calls
      # that happened to touch the table without inserting).
      FilterPattern: '"admin_audit_logs chain row="'
      MetricTransformations:
        - MetricNamespace: Luciel/Backend
          MetricName: AdminAuditLogWriteCount
          MetricValue: "1"
          DefaultValue: 0
          Unit: Count

  OpsRoleConnectMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref BackendLogGroupName
      FilterName: luciel-backend-ops-role-connect
      # app.db.session emits exactly this prefix on every
      # OpsSessionLocal connect (Arc 9 C7.1 listener); the
      # python-side string is contract-locked with
      # tests/db/test_c7_1_ops_connect_log_format.py.
      FilterPattern: '"arc9.c7.ops_role_connect"'
      MetricTransformations:
        - MetricNamespace: Luciel/Backend
          MetricName: OpsRoleConnectCount
          MetricValue: "1"
          DefaultValue: 0
          Unit: Count

  GUCLeakGuardViolationMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref BackendLogGroupName
      FilterName: luciel-backend-guc-leak-guard-violation
      # The C6.4 guard raises AssertionError with the literal
      # phrase "OpsSessionLocal must not carry app.admin_id" when
      # an ops session is somehow seen with a tenant GUC set.
      # Any occurrence in prod is structurally impossible (the
      # sessionmaker boundary makes it so) -- a single hit is a
      # high-severity invariant violation.
      FilterPattern: '"OpsSessionLocal must not carry app.admin_id"'
      MetricTransformations:
        - MetricNamespace: Luciel/Backend
          MetricName: GUCLeakGuardViolationCount
          MetricValue: "1"
          DefaultValue: 0
          Unit: Count

  AuditLogIntegrityBreachMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref BackendLogGroupName
      FilterName: luciel-backend-audit-log-integrity-breach
      # Postgres raises errors with code 42501 / message containing
      # "new row violates row-level security policy" or the
      # C6.2 RESTRICTIVE policy denial phrases. The two strings
      # below cover both Postgres-level denial messages that fire
      # when ANYTHING attempts to UPDATE or DELETE admin_audit_logs
      # (including superuser, including a compromised app role).
      FilterPattern: '?"row violates row-level security policy for table \"admin_audit_logs\"" ?"new row violates row-level security policy for table \"admin_audit_logs\""'
      MetricTransformations:
        - MetricNamespace: Luciel/Backend
          MetricName: AuditLogIntegrityBreachCount
          MetricValue: "1"
          DefaultValue: 0
          Unit: Count

  # ------------------------------------------------------------------
  # C7 Alarms
  # ------------------------------------------------------------------

  AuditLogIntegrityBreachAlarm:
    Type: AWS::CloudWatch::Alarm
    DependsOn: AuditLogIntegrityBreachMetricFilter
    Properties:
      AlarmName: luciel-audit-log-integrity-breach
      AlarmDescription: >
        HIGH SEVERITY (D7.2). The C6.2 RESTRICTIVE policy on
        admin_audit_logs denied an UPDATE or DELETE attempt. The
        policy DID block the attempt -- this alarm exists so we
        learn about the attempt in real time, regardless of the
        actor (app role, ops role, superuser, compromised
        credentials). A single occurrence pages.
      Namespace: Luciel/Backend
      MetricName: AuditLogIntegrityBreachCount
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic
        - !Ref PagerDutyTopic
      OKActions:
        - !Ref AlertTopic

  GUCLeakGuardViolationAlarm:
    Type: AWS::CloudWatch::Alarm
    DependsOn: GUCLeakGuardViolationMetricFilter
    Properties:
      AlarmName: luciel-guc-leak-guard-violation
      AlarmDescription: >
        HIGH SEVERITY (D7.2). The C6.4 GUC-leak guard fired in
        prod -- meaning an OpsSessionLocal session was opened
        while a tenant ContextVar was set. This should be
        structurally impossible (the sessionmaker boundary
        prevents GUC propagation), so any hit indicates either a
        framework regression or a manual override. Pages
        immediately.
      Namespace: Luciel/Backend
      MetricName: GUCLeakGuardViolationCount
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic
        - !Ref PagerDutyTopic
      OKActions:
        - !Ref AlertTopic

  OpsRoleConnectVelocityAlarm:
    Type: AWS::CloudWatch::Alarm
    DependsOn: OpsRoleConnectMetricFilter
    Properties:
      AlarmName: luciel-ops-role-connect-velocity
      AlarmDescription: >
        MEDIUM SEVERITY (D7.1). luciel_ops BYPASSRLS connections
        exceeded the velocity threshold in a 15-minute window.
        Normal ops cleanup is <=2/day; sustained high velocity
        signals an automation runaway, a debugging session
        someone forgot to close, or unauthorized access. Pages
        AlertTopic only (no PagerDuty).
      Namespace: Luciel/Backend
      MetricName: OpsRoleConnectCount
      Statistic: Sum
      Period: 900
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: !Ref OpsRoleConnectVelocityThreshold
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic

  AdminAuditWriteVelocityAlarm:
    Type: AWS::CloudWatch::Alarm
    DependsOn: AdminAuditLogWriteMetricFilter
    Properties:
      AlarmName: luciel-admin-audit-write-velocity
      AlarmDescription: >
        MEDIUM SEVERITY (D7.1). admin_audit_logs write velocity
        exceeded the configured threshold in a 5-minute window.
        Catches cascade bugs, accidental bulk operations, and
        compromised-admin runs without paging on the steady-state
        click-by-click admin traffic. Pages AlertTopic only.
      Namespace: Luciel/Backend
      MetricName: AdminAuditLogWriteCount
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: !Ref AdminAuditWriteVelocityThreshold
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic

Outputs:
  AlertTopicArn:
    Description: ARN of the SNS topic for alarm notifications.
    Value: !Ref AlertTopic
    Export:
      Name: !Sub "${AWS::StackName}-AlertTopicArn"
  HeartbeatMetricNamespace:
    Description: Custom metric namespace used by Luciel worker filters.
    Value: Luciel/Worker
  AlarmsCreated:
    Description: Number of CloudWatch alarms in this stack.
    Value: "11"
  PagerDutyTopicArn:
    Description: ARN of the PagerDuty High-severity SNS topic (Arc 9 C7).
    Value: !Ref PagerDutyTopic
    Export:
      Name: !Sub "${AWS::StackName}-PagerDutyTopicArn"
  BackendMetricNamespace:
    Description: CloudWatch metric namespace used by Arc 9 C7 backend filters.
    Value: Luciel/Backend
