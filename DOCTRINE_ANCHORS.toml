status = "MATCHES-DOC"
paths = ["app/migrations/"]
note = "Unit 13f moved the Alembic tree from alembic/ to the §8 path app/migrations/ as a pure config-coupled relocation (git mv of env.py, script.py.mako, and all versions/*.py — 100%-similarity renames, zero migration-SQL change). alembic.ini script_location was repointed alembic -> app/migrations; env.py is location-agnostic (imports app.core.config.settings, no __file__ path math). All path references updated: run_tests.sh (no alembic path ref), Dockerfile (dropped redundant COPY alembic/), .github/workflows/widget-e2e.yml + ci.yml path filters, widget/README.md, scripts/deploy_30a*.{ps1,sh}, scripts/mint_*.py, scripts/arc11_close_audit.py (now prunes app/migrations/ from its Arc-14 AST scan to preserve the prior 'migrations excluded' invariant), and ~44 test/script files constructing the versions path. Revision chain intact, single head = unit13e_session_summaries; upgrade head + single-step round-trip verified from the new location."

[[anchor]]
id = "analytics"
doctrine = "§8 — app/analytics/ (§3.9, reads-only, no new write path)"
status = "MATCHES-DOC"
paths = ["app/analytics/"]
note = "Unit 13d built the §3.9 Analytics & Reporting subsystem at the §8 path. app/analytics/service.py::AnalyticsService computes read-only aggregate metrics (conversations, leads, escalations-by-signal, escalation→ack p50/p95, appointments booked, conversion rate, channel mix, budget utilization, top knowledge sources, busiest-times) entirely via SELECT aggregates scoped WHERE admin_id=:admin_id through the RLS-bound TenantScoped session. NO new tables, NO new write path, NO new PII. The lone write the unit adds is admin lead-outcome (app/api/v1/admin_leads.py → leads.outcome), which is lead BUSINESS data the admin owns, not analytics data. The HTTP surface is app/api/v1/analytics.py (tier-shaped GET + Pro CSV export); it EXTENDS app/api/v1/admin/usage.py (reuses the budget meter, does not duplicate it)."

[[anchor]]
id = "isolation_suite"
doctrine = "§8 — tests/isolation/"
status = "MATCHES-DOC"
paths = ["tests/isolation/"]
note = "Unit 13f MOVE 2 consolidated the behavioral tenant-isolation suite under the §8 path tests/isolation/, per the FOUNDER RULING that tests/isolation/ is defined by BEHAVIORAL PURPOSE — a LIVE cross-tenant non-access gate — NOT by filename and NOT by the prior 563-test tests/security/+tests/db/ bucket. A test belongs here only if it proves, at runtime against a live Postgres and as a NON-SUPERUSER role (RLS only bites non-superusers), that tenant A cannot read/write/observe tenant B's rows (FORCE RLS, GUC/bind_tenant_scope scoping, cross-tenant non-access, RLS fuzz/leak). 7 behavioral files (30 tests) were git-mv'd in: test_c9_5_live_rls_integration, test_arc9_ws4b_rls_fuzz, test_arc11_knowledge_rls, test_rescanc_graph_kb_rls, test_unit13d_analytics_isolation, test_unit13e_session_key_isolation, test_unit13e_session_summary_isolation. Migration-SHAPE / migration-CONTRACT tests (regex/parse migration SOURCE TEXT, do NOT run against a live DB — e.g. the rls_c3/c4/c5 family, c5_4_tenant_leak_regression, arc15_a/b, rescanc_*_migration_shape, c6_1/c6_2, unit13c_auth_class_migration, arc10/arc12 privilege/drop shape) were SEPARATED to the new tests/migrations_contract/ package — they are migration-contract tests, not behavioral isolation, and counting them as isolation diluted the gate's meaning. General security/perf/retrieval/lifecycle tests stayed in tests/security/ + tests/db/. Nothing was deleted or weakened: the full suite total is unchanged (2834 passed); the labeled isolation count dropped from 563 to 30 by design, and the entire delta is migration-shape/non-isolation tests that moved or stayed, NOT behavioral coverage. run_tests.sh isolation subset = tests/isolation (only); full suite = tests/."
