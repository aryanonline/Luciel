# DOCTRINE_ANCHORS.toml — machine-readable §8 doctrine-path map (Unit 12)
#
# The ratified Architecture document (§8 "Module / Path Doctrine") is the
# single source of truth for where each subsystem's code lives. It is
# canon and lives in the Space, NOT in this repo. This file is the
# in-repo machine-readable projection of that doctrine: each [[anchor]]
# maps a §8 doctrine path to the actual repo path(s) it resolves to, plus
# a status. The CI doc-sync gate (.github/scripts/doctrine_sync_gate.py)
# reads the `paths` globs to decide whether a PR touched a
# doctrine-anchored path and therefore must also update the architecture
# doc (proxied in-repo by a DOCTRINE_CHANGELOG.md entry — see §5.9.3 and
# the [meta] note below).
#
# status vocabulary:
#   MATCHES-DOC             code lives at the §8 path (post-Unit-12 normalization)
#   CONFIG-BOUND-EXCEPTION  §8 path cannot be adopted because external tooling
#                           binds the actual path (documented, flagged for ruling)
#   NO-MODULE-YET           §8 names a subsystem that is not built; nothing to relocate
#   ISOLATION-SUITE         §8 path deferred to protect the non-negotiable isolation gate

[meta]
unit = "Unit 12"
governing_principle = "The business documents are the only ultimate source of truth; when code and the ratified Architecture doc diverge, the code is wrong — move the code to match §8."
arch_doc_location = "external (Space) — read-only canon, not in this repo"
in_repo_doc_proxy = "DOCTRINE_CHANGELOG.md"
gate_rule = "§5.9.3 — a PR that changes any doctrine-anchored path MUST also add a DOCTRINE_CHANGELOG.md entry (the in-repo reviewer-reconciled proxy for 'architecture doc updated', since the .md canon lives in the Space)."

