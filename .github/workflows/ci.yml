# Step 29 Commit D: continuous integration gate.
#
# Scope (intentional, doctrine "honest long term fixes -- not shortcuts"):
#
#   This workflow runs the BACKEND-FREE checks: AST tests for the
#   admin-forensics endpoints (Step 29 Commits C.1-C.6 + D), the
#   verification http_client unit tests (Step 29 Commit B), the
#   /healthz smoke test, and the pytest-collection / registry-shape
#   guard from tests/verification/test_pillars.py.
#
#   The pillar suite itself (the 22 live-API pillars) is NOT run here.
#   Doing so would require provisioning a Postgres service, a Redis
#   service, running Alembic migrations, booting uvicorn, and exporting
#   a platform-admin key into the runner -- a multi-minute job per push.
#   The pillar suite is run instead via 'python -m app.verification' in
#   the luciel-verify ECS task definition against the production-or-
#   staging backend, which is the verify gate of record (see
#   docs/CANONICAL_RECAP.md section 4.4 "Step 29 verification doctrine").
#
#   The pytest harness in tests/verification/test_pillars.py is built
#   so that, when DATABASE_URL is unset (the case in this workflow),
#   pillar tests collect with an empty parametrize list and skip
#   cleanly. The one test that DOES run is the registry-shape guard
#   (test_registry_returns_nonempty_pillar_list, which is gated on
#   _registry_loaded and so also skips here). This is intentional:
#   shape regressions are caught locally where DATABASE_URL is set.
#
#   When/if we add a CI job that does stand up the backend (deferred
#   follow-up step), it will be a separate job in this workflow with
#   the 'services:' block populated; the existing jobs below stay
#   backend-free so they keep providing their fast-feedback signal.

name: ci

on:
  push:
    branches:
      - main
      - "step-*"
  pull_request:
    branches:
      - main

# Don't waste runner minutes on superseded pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ast-and-unit-tests:
    name: AST + unit tests (backend-free)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: install pytest + httpx (no app deps needed for AST tests)
        # The Step 29 AST tests only need the stdlib's `ast` module. The
        # http_client_params tests need httpx. test_health.py needs
        # FastAPI + the app surface; we install the package in non-editable
        # mode so import paths work the same as locally.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest httpx

      - name: run admin-forensics AST tests (Step 29 C.1-C.6 + D guards)
        # This is the ONLY check that pins the cross-pillar architectural
        # invariants we landed in Commits C.4 / C.5 / C.6 / D. A break here
        # means a future refactor regressed one of:
        #   - C.4: P14 forensic reads route through admin endpoints
        #   - C.5: P11 F10 ORM-write goes through platform-admin POST,
        #          audit-row-before-mutation
        #   - C.6: _broker_reachable / _worker_reachable single-source +
        #          forensics_get(200,404) wrapper
        #   - D:   pillar registry as single source of truth + harness
        #          imports from registry not from __main__
        run: python tests/api/test_admin_forensics_step29c.py

      - name: run http_client params + health pytest tests
        # tests/api/test_health.py imports `app.main`, which transitively
        # imports `app.core.config.Settings`. Settings.database_url is a
        # required field with no default, so a bare CI runner with no
        # DATABASE_URL exported fails pytest collection with a Pydantic
        # ValidationError before any test code runs. The /health endpoint
        # itself does NOT touch the DB -- it returns {"status": "ok",
        # "service": settings.app_name} -- so a stub URL is sufficient.
        # We use sqlite:///:memory: rather than a postgres+asyncpg URL
        # because asyncpg is not in the CI install set; sqlite ships with
        # SQLAlchemy core and resolves at engine-creation time without
        # touching the network. The DATABASE_URL is scoped to this step
        # only so the next step (pillar harness collection) keeps its
        # "skip cleanly when DATABASE_URL is unset" behavior, which is
        # the contract the file-header comment block above documents.
        env:
          DATABASE_URL: "sqlite:///:memory:"
          # OPENAI_API_KEY is set to a non-functional placeholder so that
          # `app.main` import succeeds during pytest collection. The module-
          # level ModerationGate.from_settings(settings) in chat_widget.py
          # raises ConfigurationError at import time when moderation_provider
          # defaults to 'openai' and the key is empty (Step 30d Deliverable B
          # judgment #4: crash-loop on rollout, not first-request). That
          # boot-time crash is the correct PRODUCTION behavior -- uvicorn
          # never accepts traffic with a misconfigured gate -- but pytest
          # collection in a backend-free CI runner is a different lifecycle
          # and must be able to import the app surface to test it. The key
          # is intentionally non-functional (would 401 against the real API)
          # so any test that accidentally tries a real moderation call fails
          # loudly at the httpx boundary rather than silently passing.
          OPENAI_API_KEY: "ci-not-a-real-key-backend-free-tests-only"
        run: python -m pytest tests/verification/test_http_client_params.py tests/api/test_health.py tests/api/test_embed_key_preflight.py tests/api/test_content_safety_gate.py tests/api/test_widget_e2e_harness_shape.py tests/api/test_step24_5c_models_shape.py tests/api/test_step24_5c_cross_session_retriever_shape.py tests/api/test_step24_5c_identity_resolver_shape.py tests/api/test_step24_5c_adapter_claims_shape.py tests/api/test_step24_5c_live_e2e_shape.py tests/api/test_step31_dashboard_service_shape.py tests/api/test_step31_dashboard_http_shape.py tests/api/test_step31_validation_gate_shape.py -v

      - name: run pillar harness collection (skips cleanly without DB)
        # Even though every pillar test will SKIP here (no DATABASE_URL,
        # no backend), this step exercises the collection path and the
        # _REGISTRY_IMPORT_ERROR guard. A regression that broke the
        # try/except at the top of test_pillars.py would surface as a
        # collection error here.
        run: python -m pytest tests/verification/test_pillars.py -v

  widget-build-and-size:
    name: Widget bundle build + size gate (Step 30b)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: widget/package-lock.json

      - name: install widget deps
        # `npm ci` requires a committed package-lock.json. The first
        # time CI runs this job, the file will not exist yet and we
        # fall back to `npm install` so the gate produces signal
        # rather than failing on missing lockfile. Subsequent commits
        # MUST commit the lockfile -- the size budget is meaningless
        # without pinned dep versions.
        working-directory: widget
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "::warning::widget/package-lock.json missing -- using npm install. Commit the lockfile."
            npm install --no-audit --no-fund
          fi

      - name: build widget
        working-directory: widget
        run: npm run build

      - name: enforce <=40 KB gzipped ceiling
        working-directory: widget
        run: npm run size

      - name: upload widget bundle as artifact
        # The bundle is consumed downstream by the widget-cdn-deploy job
        # so deploy never trusts a different node_modules / npm cache
        # than the one the size gate validated. Artifacts are scoped to
        # the workflow run, expire after 1 day, and are not exposed
        # outside the repo.
        uses: actions/upload-artifact@v4
        with:
          name: widget-dist
          path: widget/dist/
          retention-days: 1
          if-no-files-found: error

  widget-cdn-deploy:
    name: Widget bundle deploy to CDN (Step 30b Phase 2B)
    # Only on direct pushes to main. Pull requests do NOT deploy --
    # they are gated on the build+size job above for signal, but the
    # OIDC role's trust policy refuses ref:refs/heads/<other-branch>
    # anyway, so this is defense in depth.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: widget-build-and-size
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      # Required for the GitHub OIDC token used by aws-actions/configure-
      # aws-credentials. Default GITHUB_TOKEN does not include id-token.
      id-token: write
      contents: read
    env:
      AWS_REGION: ca-central-1
      WIDGET_CDN_DEPLOY_ROLE_ARN: arn:aws:iam::729005488042:role/luciel-widget-cdn-deploy
      # The deploy script also reads these. They are baked in as the
      # script's defaults, but setting them here makes the job log
      # explicit about what stack the runner is targeting.
      WIDGET_CDN_BUCKET: luciel-widget-cdn-prod-ca-central-1
      WIDGET_CDN_DISTRIBUTION_ID: EU5R6YVX26RPY
      WIDGET_CDN_DISTRIBUTION_DOMAIN: d1t84i96t71fsi.cloudfront.net
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: download bundle from build job
        # Same artifact the size gate just validated. The deploy script
        # expects widget/dist/luciel-chat-widget.js + .map; that is what
        # was uploaded.
        uses: actions/download-artifact@v4
        with:
          name: widget-dist
          path: widget/dist/

      - name: configure AWS credentials via GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.WIDGET_CDN_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          # 15 minutes is enough for the upload + invalidation wait;
          # shorter session = smaller blast radius if the token leaks.
          role-session-name: gha-widget-cdn-deploy-${{ github.run_id }}
          role-duration-seconds: 900

      - name: run deploy script
        # The script is idempotent: same content -> same hash -> no-op
        # at the object level, but a fresh invalidation is still issued
        # so any edge with a stale alias picks up. This is by design.
        run: bash scripts/deploy_widget_cdn.sh

      - name: post-deploy reachability check
        # Smoke test from the runner's network (a public internet point
        # outside our control). HEAD instead of GET to avoid pulling
        # the bundle bytes; only checks status, content-type, and
        # cache-control. If any of these regress, the job fails and
        # the post-merge tag does not get applied.
        run: |
          set -euo pipefail
          URL="https://${WIDGET_CDN_DISTRIBUTION_DOMAIN}/widget.js"
          echo "==> HEAD ${URL}"
          # Allow up to 90 seconds for the invalidation to propagate to
          # the runner's nearest edge (the deploy script already waited
          # for the invalidation to complete, but propagation to a
          # specific edge can lag a few extra seconds).
          for attempt in 1 2 3 4 5 6; do
            if curl --silent --show-error --fail-with-body --location \
                    --max-time 15 \
                    --output /dev/null --write-out '%{http_code} %{content_type}\n' \
                    --head "${URL}" | tee /tmp/curl.out | grep -E '^200 application/javascript'; then
              echo "==> reachability OK on attempt ${attempt}"
              exit 0
            fi
            echo "::warning::attempt ${attempt} did not match expected response, retrying in 15s"
            sleep 15
          done
          echo "::error::widget.js did not return 200 + application/javascript after 6 attempts"
          cat /tmp/curl.out
          exit 1

  # ---------------------------------------------------------------------------
  # Future job (intentionally not enabled now): full pillar verify suite.
  # Uncomment + flesh out when we're ready to pay the per-push minutes for
  # spinning up Postgres, Redis, running migrations, booting uvicorn, and
  # piping LUCIEL_PLATFORM_ADMIN_KEY in via secrets. Until then, the verify
  # gate of record stays luciel-verify:N against prod (Step 29 E(iv)).
