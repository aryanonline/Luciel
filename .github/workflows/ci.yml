# Step 29 Commit D + Arc 9 C7 Commit B: continuous integration gate.
#
# Scope (intentional, doctrine "honest long term fixes -- not shortcuts"):
#
#   This workflow runs the BACKEND-FREE checks: AST tests for the
#   admin-forensics endpoints (Step 29 Commits C.1-C.6 + D), the
#   /health smoke test (collected via app.main import), the shape
#   guards for the Step 24.5c / Step 31 services, and the Arc 9 C7.1
#   OpsSessionLocal connect-event log-format contract.
#
#   The pillar suite (the 22 live-API pillars) is NOT run here. Doing
#   so would require provisioning Postgres + Redis services, running
#   Alembic migrations, booting uvicorn, and exporting a platform-
#   admin key into the runner -- a multi-minute job per push. The
#   pillar suite is run instead via 'python -m app.verification' in
#   the luciel-verify ECS task definition against the production-or-
#   staging backend, which is the verify gate of record (anchor:
#   Architecture v1 §6 operational maturity / verify gate contract).
#
#   Per Architecture v1 §6 (operational maturity — CI gate contract):
#   this workflow is the required check on the 'main' branch
#   protection rule. No PR merges to main with a red CI run, full
#   stop. Branch protection enforces this gate at the GitHub repo
#   level. Any admin-merge override requires explicit recording in
#   the PR description.
#
#   Seven test references that were stale on main between Arc 7 and
#   Arc 9 C7 have been removed from the pytest invocation below:
#
#     * test_http_client_params.py (file missing)
#     * test_embed_key_preflight.py (file missing)
#     * test_step31_dashboard_service_shape.py (file missing)
#     * test_pillars.py (file missing)
#     * test_step31_validation_gate_shape.py (AST target
#       tests/e2e/step_31_validation_gate.py missing)
#     * test_step24_5c_live_e2e_shape.py (AST target
#       tests/e2e/step_24_5c_live_e2e.py missing)
#
#   These all referenced files that were renamed or deleted in earlier
#   sub-arcs and the workflow was never updated, which forced 6
#   consecutive admin-merges into main between PR #72 and PR #77.
#   Removing them re-arms the gate.
#
#   Arc 9 C8.1 closed the 2-test gap that was previously deselected via
#   a -k filter on test_step24_5c_models_shape.py. The 2 tests were
#   asserting a FK target (tenant_configs.tenant_id) that no longer
#   exists -- tenant_configs was dropped in Arc 5 Revision C and admins.id
#   replaces it 1:1. C8.1 rewrote those 2 tests to assert FK -> admins.id
#   RESTRICT (the actual current contract) and folded the full file back
#   into the main pytest line above. No -k filter remains.

name: ci

on:
  push:
    branches:
      - main
      - "step-*"
      # Arc 10 PR #102: feature branches matching arc*/** now trigger CI
      # so the backend-image-build job below can produce ECR images for
      # the migration runner and the ECS service update *before* the
      # branch lands on main. The CI run on the eventual merge commit
      # to main is still the gate of record (branch protection).
      - "arc*/**"
      - "arc*"
  pull_request:
    branches:
      - main

# Don't waste runner minutes on superseded pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ast-and-unit-tests:
    name: AST + unit tests (backend-free)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: install pytest + httpx (no app deps needed for AST tests)
        # The Step 29 AST tests only need the stdlib's `ast` module. The
        # http_client_params tests need httpx. test_health.py needs
        # FastAPI + the app surface; we install the package in non-editable
        # mode so import paths work the same as locally.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest httpx

      - name: run admin-forensics AST tests (Step 29 C.1-C.6 + D guards)
        # This is the ONLY check that pins the cross-pillar architectural
        # invariants we landed in Commits C.4 / C.5 / C.6 / D. A break here
        # means a future refactor regressed one of:
        #   - C.4: P14 forensic reads route through admin endpoints
        #   - C.5: P11 F10 ORM-write goes through platform-admin POST,
        #          audit-row-before-mutation
        #   - C.6: _broker_reachable / _worker_reachable single-source +
        #          forensics_get(200,404) wrapper
        #   - D:   pillar registry as single source of truth + harness
        #          imports from registry not from __main__
        run: python tests/api/test_admin_forensics_step29c.py

      - name: run http_client params + health pytest tests
        # tests/api/test_health.py imports `app.main`, which transitively
        # imports `app.core.config.Settings`. Settings.database_url is a
        # required field with no default, so a bare CI runner with no
        # DATABASE_URL exported fails pytest collection with a Pydantic
        # ValidationError before any test code runs. The /health endpoint
        # itself does NOT touch the DB -- it returns {"status": "ok",
        # "service": settings.app_name} -- so a stub URL is sufficient.
        # We use sqlite:///:memory: rather than a postgres+asyncpg URL
        # because asyncpg is not in the CI install set; sqlite ships with
        # SQLAlchemy core and resolves at engine-creation time without
        # touching the network. The DATABASE_URL is scoped to this step
        # only so the next step (pillar harness collection) keeps its
        # "skip cleanly when DATABASE_URL is unset" behavior, which is
        # the contract the file-header comment block above documents.
        env:
          DATABASE_URL: "sqlite:///:memory:"
          # OPENAI_API_KEY is set to a non-functional placeholder so that
          # `app.main` import succeeds during pytest collection. The module-
          # level ModerationGate.from_settings(settings) in chat_widget.py
          # raises ConfigurationError at import time when moderation_provider
          # defaults to 'openai' and the key is empty (Step 30d Deliverable B
          # judgment #4: crash-loop on rollout, not first-request). That
          # boot-time crash is the correct PRODUCTION behavior -- uvicorn
          # never accepts traffic with a misconfigured gate -- but pytest
          # collection in a backend-free CI runner is a different lifecycle
          # and must be able to import the app surface to test it. The key
          # is intentionally non-functional (would 401 against the real API)
          # so any test that accidentally tries a real moderation call fails
          # loudly at the httpx boundary rather than silently passing.
          OPENAI_API_KEY: "ci-not-a-real-key-backend-free-tests-only"
        # The test set below is the union of "backend-free shape guards
        # that exist on main AND whose AST targets still exist on main
        # AND that pass against the current schema". Seven references
        # previously listed here were stale -- see the file-header
        # comment block for the full enumeration and rationale.
        run: python -m pytest tests/api/test_health.py tests/api/test_content_safety_gate.py tests/api/test_widget_e2e_harness_shape.py tests/api/test_step24_5c_cross_session_retriever_shape.py tests/api/test_step24_5c_identity_resolver_shape.py tests/api/test_step24_5c_adapter_claims_shape.py tests/api/test_step31_dashboard_http_shape.py -v

      - name: run Step 24.5c models-shape guards
        # Arc 9 C8.1 (this PR's predecessor) rewrote the 2 tests that
        # used to be deselected here -- they now assert FK -> admins.id
        # RESTRICT (the current correct contract) instead of the dropped
        # tenant_configs natural key. Full file is in the gate without
        # any -k filter.
        env:
          DATABASE_URL: "sqlite:///:memory:"
          OPENAI_API_KEY: "ci-not-a-real-key-backend-free-tests-only"
        run: python -m pytest tests/api/test_step24_5c_models_shape.py -v

      - name: run Arc 9 C8.3 sandbox-agent scoped IAM policy shape
        # Arc 9 doctrine D8.1 -- "luciel-sandbox-agent uses a scoped
        # policy that names every action it needs. *:* never returns
        # to the scope." These 5 AST guards lock the CloudFormation
        # template `cfn/luciel-sandbox-agent-policy.yaml` against:
        #   (1) wildcard Action='*' paired with Resource='*'
        #   (2) drift in the DenySelfPrivilegeEscalation stanza
        #   (3) drift in the DenyAdminPolicyAttachment condition
        #   (4) write actions escaping the luciel-* resource scope
        #   (5) rename of the customer-managed policy name (the IAM
        #       Allow stanza references it by ARN)
        # Backend-free -- only parses YAML, no DB/network.
        env:
          DATABASE_URL: "sqlite:///:memory:"
          OPENAI_API_KEY: "ci-not-a-real-key-backend-free-tests-only"
        run: |
          python -m pip install pyyaml
          python -m pytest tests/infra/test_c8_3_sandbox_agent_policy_shape.py -v

      - name: run Arc 9 C9.1 prod alarms shape contract
        # Arc 9 doctrine D9.1 -- "Every prod alarm reads from a
        # namespace that actually emits its metric." The pre-C9.1
        # luciel-worker-unhealthy-task-count alarm was wired to
        # AWS/ECS (which does not emit RunningTaskCount), so it sat
        # at INSUFFICIENT_DATA -> Breaching on a perfectly healthy
        # service. This test file:
        #   (1) blocks AWS/ECS + any non-native metric (only
        #       CPUUtilization and MemoryUtilization live there)
        #   (2) locks WorkerUnhealthyTaskCountAlarm to
        #       ECS/ContainerInsights
        #   (3) requires every alarm to wire AlarmActions + OKActions
        #   (4) requires the C7+C9 critical-path alarms to exist
        # Backend-free -- only parses YAML.
        env:
          DATABASE_URL: "sqlite:///:memory:"
          OPENAI_API_KEY: "ci-not-a-real-key-backend-free-tests-only"
        run: |
          python -m pip install pyyaml
          python -m pytest tests/infra/test_c9_1_prod_alarms_shape.py -v

      - name: run Arc 9 C7.1 ops-connect log-format contract
        # Arc 9 doctrine D7.1 -- "Every grant the ops role exercises
        # emits a CloudWatch event." This test locks the literal string
        # `arc9.c7.ops_role_connect` in three places (the listener in
        # app/db/session.py, the FilterPattern in cfn/luciel-prod-alarms.yaml,
        # and the on-call grep target in the observability runbook). If
        # any of the three drifts, the alarm goes dark silently with
        # zero datapoints. This test catches that regression at PR time.
        # Uses sqlite in-memory + the _patched_settings helper, so it
        # runs backend-free.
        env:
          DATABASE_URL: "sqlite:///:memory:"
          OPENAI_API_KEY: "ci-not-a-real-key-backend-free-tests-only"
        run: python -m pytest tests/db/test_c7_1_ops_connect_log_format.py -v

  widget-build-and-size:
    name: Widget bundle build + size gate (Step 30b)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: widget/package-lock.json

      - name: install widget deps
        # `npm ci` requires a committed package-lock.json. The first
        # time CI runs this job, the file will not exist yet and we
        # fall back to `npm install` so the gate produces signal
        # rather than failing on missing lockfile. Subsequent commits
        # MUST commit the lockfile -- the size budget is meaningless
        # without pinned dep versions.
        working-directory: widget
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "::warning::widget/package-lock.json missing -- using npm install. Commit the lockfile."
            npm install --no-audit --no-fund
          fi

      - name: build widget
        working-directory: widget
        run: npm run build

      - name: enforce <=40 KB gzipped ceiling
        working-directory: widget
        run: npm run size

      - name: upload widget bundle as artifact
        # The bundle is consumed downstream by the widget-cdn-deploy job
        # so deploy never trusts a different node_modules / npm cache
        # than the one the size gate validated. Artifacts are scoped to
        # the workflow run, expire after 1 day, and are not exposed
        # outside the repo.
        uses: actions/upload-artifact@v4
        with:
          name: widget-dist
          path: widget/dist/
          retention-days: 1
          if-no-files-found: error

  widget-cdn-deploy:
    name: Widget bundle deploy to CDN (Step 30b Phase 2B)
    # Only on direct pushes to main. Pull requests do NOT deploy --
    # they are gated on the build+size job above for signal, but the
    # OIDC role's trust policy refuses ref:refs/heads/<other-branch>
    # anyway, so this is defense in depth.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: widget-build-and-size
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      # Required for the GitHub OIDC token used by aws-actions/configure-
      # aws-credentials. Default GITHUB_TOKEN does not include id-token.
      id-token: write
      contents: read
    env:
      AWS_REGION: ca-central-1
      WIDGET_CDN_DEPLOY_ROLE_ARN: arn:aws:iam::729005488042:role/luciel-widget-cdn-deploy
      # The deploy script also reads these. They are baked in as the
      # script's defaults, but setting them here makes the job log
      # explicit about what stack the runner is targeting.
      WIDGET_CDN_BUCKET: luciel-widget-cdn-prod-ca-central-1
      WIDGET_CDN_DISTRIBUTION_ID: EU5R6YVX26RPY
      WIDGET_CDN_DISTRIBUTION_DOMAIN: d1t84i96t71fsi.cloudfront.net
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: download bundle from build job
        # Same artifact the size gate just validated. The deploy script
        # expects widget/dist/luciel-chat-widget.js + .map; that is what
        # was uploaded.
        uses: actions/download-artifact@v4
        with:
          name: widget-dist
          path: widget/dist/

      - name: configure AWS credentials via GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.WIDGET_CDN_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          # 15 minutes is enough for the upload + invalidation wait;
          # shorter session = smaller blast radius if the token leaks.
          role-session-name: gha-widget-cdn-deploy-${{ github.run_id }}
          role-duration-seconds: 900

      - name: run deploy script
        # The script is idempotent: same content -> same hash -> no-op
        # at the object level, but a fresh invalidation is still issued
        # so any edge with a stale alias picks up. This is by design.
        run: bash scripts/deploy_widget_cdn.sh

      - name: post-deploy reachability check
        # Smoke test from the runner's network (a public internet point
        # outside our control). HEAD instead of GET to avoid pulling
        # the bundle bytes; only checks status, content-type, and
        # cache-control. If any of these regress, the job fails and
        # the post-merge tag does not get applied.
        run: |
          set -euo pipefail
          URL="https://${WIDGET_CDN_DISTRIBUTION_DOMAIN}/widget.js"
          echo "==> HEAD ${URL}"
          # Allow up to 90 seconds for the invalidation to propagate to
          # the runner's nearest edge (the deploy script already waited
          # for the invalidation to complete, but propagation to a
          # specific edge can lag a few extra seconds).
          for attempt in 1 2 3 4 5 6; do
            if curl --silent --show-error --fail-with-body --location \
                    --max-time 15 \
                    --output /dev/null --write-out '%{http_code} %{content_type}\n' \
                    --head "${URL}" | tee /tmp/curl.out | grep -E '^200 application/javascript'; then
              echo "==> reachability OK on attempt ${attempt}"
              exit 0
            fi
            echo "::warning::attempt ${attempt} did not match expected response, retrying in 15s"
            sleep 15
          done
          echo "::error::widget.js did not return 200 + application/javascript after 6 attempts"
          cat /tmp/curl.out
          exit 1

  backend-image-build-and-push:
    # ---------------------------------------------------------------------------
    # Arc 10: builds the backend Docker image from the current ref and pushes
    # it to the luciel-backend ECR repo. Required because the migration
    # runner ECS one-shot, the worker service redeploy, and the backend
    # service redeploy all need an Arc-10 image tag in ECR before they can
    # run. Prior to Arc 10 this build happened on the founder's laptop
    # via scripts/deploy_arc8.ps1; closing that drift is part of Arc 10's
    # "production-grade standards" alignment with Vision Section 6 / 7.
    #
    # Pushes two tags per build:
    #   * <branch-slug>-<short-sha>  (immutable, what services reference)
    #   * <branch-slug>-latest        (mutable, for diagnostic 'is main
    #     ahead of staging?' grep-ability; never referenced by a service)
    #
    # Trust scoping: the luciel-backend-ci-build OIDC role's trust policy
    # only accepts subs of repo:aryanonline/Luciel:ref:refs/heads/main
    # and repo:aryanonline/Luciel:ref:refs/heads/arc*/**. Other refs
    # cannot AssumeRoleWithWebIdentity even if this if: condition is bypassed.
    # ---------------------------------------------------------------------------
    name: Backend image build + push to ECR (Arc 10)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/arc'))
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ca-central-1
      BACKEND_CI_BUILD_ROLE_ARN: arn:aws:iam::729005488042:role/luciel-backend-ci-build
      ECR_REGISTRY: 729005488042.dkr.ecr.ca-central-1.amazonaws.com
      ECR_REPOSITORY: luciel-backend
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: compute image tags
        id: tags
        # The branch slug replaces / with - so refs/heads/arc10/lifecycle-subsystem
        # becomes arc10-lifecycle-subsystem. The short sha is the canonical
        # immutable identifier; the -latest tag is only for grep convenience.
        run: |
          BRANCH_RAW="${GITHUB_REF#refs/heads/}"
          BRANCH_SLUG=$(echo "$BRANCH_RAW" | tr '/' '-' | tr -c 'a-zA-Z0-9._-' '-' | sed 's/--*/-/g; s/^-//; s/-$//')
          SHORT_SHA="$(echo "$GITHUB_SHA" | cut -c1-7)"
          IMMUTABLE_TAG="${BRANCH_SLUG}-${SHORT_SHA}"
          LATEST_TAG="${BRANCH_SLUG}-latest"
          echo "branch_slug=${BRANCH_SLUG}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}"     >> "$GITHUB_OUTPUT"
          echo "immutable_tag=${IMMUTABLE_TAG}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${LATEST_TAG}"    >> "$GITHUB_OUTPUT"
          echo "==> branch_slug=${BRANCH_SLUG}"
          echo "==> immutable_tag=${IMMUTABLE_TAG}"
          echo "==> latest_tag=${LATEST_TAG}"

      - name: configure AWS credentials via GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BACKEND_CI_BUILD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-backend-build-${{ github.run_id }}
          role-duration-seconds: 1800

      - name: ECR login
        # aws-actions/amazon-ecr-login@v2 returns the registry URL as an
        # output; we don't use it (the registry is hard-coded above) but
        # the action also configures the docker credential helper.
        uses: aws-actions/amazon-ecr-login@v2

      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: docker build + push (immutable + latest tags)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          # BUILD_GIT_SHA matches the deploy_arc8.ps1 convention -- the
          # /api/v1/version endpoint reads this at runtime, so the
          # CI-built image is observably equivalent to a laptop-built one.
          build-args: |
            BUILD_GIT_SHA=${{ steps.tags.outputs.short_sha }}
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.tags.outputs.immutable_tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.tags.outputs.latest_tag }}
          # Buildx in-line cache: speeds up subsequent builds without
          # requiring an external registry cache backend. ECR doesn't
          # support cache manifests, so inline is the simplest valid option.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: post-push verification
        # Confirm the immutable tag is resolvable in ECR. This catches
        # the case where docker push silently no-ops due to a registry
        # permissions gap on PutImage (which our scoped role permits but
        # has been a footgun on prior arcs).
        #
        # Uses --output json because --output table chokes when a row
        # element is an array (imageTags is array<string>), failing with
        # "Row should have 2 elements, instead it has 1". The first build
        # of this job hit that exact bug; the push itself was fine.
        run: |
          set -euo pipefail
          aws ecr describe-images \
            --repository-name "${ECR_REPOSITORY}" \
            --image-ids imageTag="${{ steps.tags.outputs.immutable_tag }}" \
            --query 'imageDetails[0].{tags:imageTags,pushedAt:imagePushedAt,sizeBytes:imageSizeInBytes,digest:imageDigest}' \
            --output json

  # ---------------------------------------------------------------------------
  # Future job (intentionally not enabled now): full pillar verify suite.
  # Uncomment + flesh out when we're ready to pay the per-push minutes for
  # spinning up Postgres, Redis, running migrations, booting uvicorn, and
  # piping LUCIEL_PLATFORM_ADMIN_KEY in via secrets. Until then, the verify
  # gate of record stays luciel-verify:N against prod (Step 29 E(iv)).
  #
  # verify-suite:
  #   name: pillar verification suite (full backend stack)
  #   runs-on: ubuntu-latest
  #   timeout-minutes: 30
  #   services:
  #     postgres:
  #       image: postgres:15
  #       env:
  #         POSTGRES_USER: luciel
  #         POSTGRES_PASSWORD: luciel
  #         POSTGRES_DB: luciel
  #       ports: ["5432:5432"]
  #       options: >-
  #         --health-cmd pg_isready
  #         --health-interval 10s
  #         --health-timeout 5s
  #         --health-retries 5
  #     redis:
  #       image: redis:7
  #       ports: ["6379:6379"]
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-python@v5
  #       with: { python-version: "3.12", cache: pip }
  #     - run: python -m pip install -e .
  #     - run: alembic upgrade head
  #       env:
  #         DATABASE_URL: postgresql+psycopg2://luciel:luciel@localhost:5432/luciel
  #     - run: |
  #         uvicorn app.main:app --host 127.0.0.1 --port 8000 &
  #         sleep 5
  #     - run: python -m app.verification --json-report verify_ci.json
  #       env:
  #         DATABASE_URL: postgresql+psycopg2://luciel:luciel@localhost:5432/luciel
  #         LUCIEL_PLATFORM_ADMIN_KEY: ${{ secrets.LUCIEL_PLATFORM_ADMIN_KEY }}
  #     - uses: actions/upload-artifact@v4
  #       with:
  #         name: verify_ci.json
  #         path: verify_ci.json
